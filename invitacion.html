<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación</title>

<style>
body {
    margin: 0;
    background: black;
}

/* contenedor */
.container {
    position: relative;
    max-width: 500px;
    margin: auto;
}

/* imagen fondo */
img {
    width: 100%;
    display: block;
}

/* BOTONES SOBRE LA IMAGEN */
.boton {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    background: #8C6A2F;
    color: white;
    padding: 10px 20px;
    border-radius: 25px;
    text-decoration: none;
    font-size: 14px;
}

/* posiciones (AJUSTA SI QUIERES) */
.boton1 { top: 55%; }   /* ceremonia */
.boton2 { top: 65%; }   /* recepción */
.boton3 { top: 85%; }   /* confirmar */
</style>

</head>

<body>

<div class="container">

    <!-- Imagen completa -->
    <img src="invitacion.png">

    <!-- BOTÓN CEREMONIA -->
    <a href="https://www.bing.com/maps/search?mepi=72%7ELocal%7EEmbedded%7ELocal_Magazine_List_Card_See_More&ty=17&poicount=18&usebfpr=true&v=2&sV=1&FORM=MPSRPL&style=r&q=iglesia+en+Valencia&secq=Parroquia+Nuestra+Se%C3%B1ora+del+Carmen+iglesia&sece=ypid%3AYN52109EE4BB565B2E&cp=39.483482%7E-0.370641&lvl=16"
       target="_blank" class="boton boton1">
        📍 Ver ubicación
    </a>

    <!-- BOTÓN RECEPCIÓN -->
    <a href="#" class="boton boton2">
        📍 Ver ubicación
    </a>

    <!-- BOTÓN CONFIRMAR -->
    <a href="javascript:confirmar()" class="boton boton3">
        💌 Confirmar asistencia
    </a>

</div>

<!-- MÚSICA -->
<audio id="musica" autoplay loop>
    <source src="boda.mp3" type="audio/mpeg">
</audio>

<script>
window.addEventListener('load', function() {
    const musica = document.getElementById("musica");
    musica.play().catch(() => {});
});

/* POPUP CONFIRMACIÓN */
function confirmar() {
    const respuesta = confirm("¿Podrás acompañarnos en este día tan especial?");

    if (respuesta) {
        window.open("https://wa.me/XXXXXXXXXX?text=Hola%20Javier%20y%20Laura,%20asistiré%20a%20su%20boda%20💖", "_blank");
    } else {
        window.open("https://wa.me/XXXXXXXXXX?text=Hola%20Javier%20y%20Laura,%20lamentablemente%20no%20podré%20asistir%20😔", "_blank");
    }
}
</script>

</body>
</html>
