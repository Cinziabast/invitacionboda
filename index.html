<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nos Casamos</title>

<style>
body {
    margin: 0;
    background: #f8f4ee;
}

.container {
    position: relative;
    width: 100%;
    max-width: 500px;
    margin: auto;
}

.container img {
    width: 100%;
    height: 100vh;
    object-fit: cover;
    display: block;
}

/* ESTRELLITAS */
.estrella {
    position: fixed;
    color: #d4af37;
    font-size: 20px;
    text-shadow: 0 0 8px #fff2b8;
    animation: explosion 1s ease-out forwards;
    z-index: 999;
    pointer-events: none;
}

@keyframes explosion {
    0% {
        opacity: 1;
        transform: scale(0.3);
    }
    100% {
        opacity: 0;
        transform: translate(var(--x), var(--y)) scale(2.2);
    }
}
</style>
</head>

<body>

<div class="container">
    <img src="sobre.png" onclick="abrirInvitacion()">
</div>

<audio id="sonido">
    <source src="magic.mp3" type="audio/mpeg">
</audio>

<script>
function crearEstrellas() {
    for (let i = 0; i < 26; i++) {
        const estrella = document.createElement("div");
        estrella.className = "estrella";
        estrella.innerHTML = "✦";

        const x = (Math.random() * 300 - 150) + "px";
        const y = (Math.random() * 300 - 150) + "px";

        estrella.style.left = "50%";
        estrella.style.top = "55%";
        estrella.style.setProperty("--x", x);
        estrella.style.setProperty("--y", y);

        document.body.appendChild(estrella);

        setTimeout(() => estrella.remove(), 1000);
    }
}

function abrirInvitacion() {
    const sonido = document.getElementById("sonido");
    sonido.currentTime = 0;
    sonido.play().catch(() => {});

    crearEstrellas();

    setTimeout(() => {
        window.location.href = "invitacion.html";
    }, 1100);
}
</script>

</body>
</html>
