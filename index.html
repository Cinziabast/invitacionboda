<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nos Casamos</title>

<style>
body {
    margin: 0;
    padding: 0;
    background: black;
}

/* Imagen completa */
img {
    width: 100%;
    height: auto;
    display: block;
    cursor: pointer;
}
</style>

</head>

<body>

<!-- Imagen del sobre (pantalla completa clicable) -->
<img src="sobre.png" onclick="abrirInvitacion()">

<!-- Sonido tipo varita mágica -->
<audio id="sonido">
    <source src="magic.mp3" type="audio/mpeg">
</audio>

<script>
function abrirInvitacion() {
    const sonido = document.getElementById("sonido");

    // reproducir sonido
    sonido.currentTime = 0;
    sonido.play();

    // esperar y redirigir
    setTimeout(function() {
        window.location.href = "invitacion.html";
    }, 1200);
}
</script>

</body>
</html>
