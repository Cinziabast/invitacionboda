<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nos Casamos</title>

<style>
body {
    margin: 0;
    background: black;
}

img {
    width: 100%;
    display: block;
}
</style>
</head>

<body>

<!-- Imagen completa clicable -->
<img src="sobre.png" onclick="abrirInvitacion()">

<!-- Sonido -->
<audio id="sonido">
    <source src="magic.mp3" type="audio/mpeg">
</audio>

<script>
function abrirInvitacion() {
    const sonido = document.getElementById("sonido");
    sonido.play();

    setTimeout(() => {
        window.location.href = "invitacion.html";
    }, 1200);
}
</script>

</body>
</html>
